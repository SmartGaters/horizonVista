# SmartGaters CI/CD Pipeline
# This workflow is triggered on every push to the 'deploy' branch.
name: Hamza Portfolio CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/horizon-vista
          tags: |
            type=sha
            type=raw,value=latest,enable=true
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Send webhook to Portainer
        run: |
          curl --insecure -X POST https://portainer.smartgaters.com/api/stacks/${{ secrets.PORTAINER_STACK_NAME }}/webhooks/${{ secrets.WEBHOOK }}?SHA=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}